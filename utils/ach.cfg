#textdomain wesnoth-lc

#define LIBERTY_UPGRADES_ACHIEVEMENTS

[event]
name=post advance 

    [filter]
        type=Assassin
    [/filter]

    [set_sub_achievement]
        content_for=Liberty_Classic
        id=lc_dang
        sub_id=lc_assassin
    [/set_sub_achievement]
[/event]
