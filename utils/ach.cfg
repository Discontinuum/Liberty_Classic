#enddef

#define LIBERTY_ACHIEVEMENTS
{LIBERTY_UPGRADES_ACHIEVEMENTS}

[event]
    name=side 1 turn, side 2 turn
    first_time_only=no
    {CLEAR_VARIABLE shadow_strikers}
    [store_unit]
        mode=always_clear
        [filter]
            ability_id_active=nightstalk
            [not]
                [filter_adjacent]
                    [filter_side]
                        [enemy_of]
                            side=1,2
                        [/enemy_of]
                    [/filter_side]
                [/filter_adjacent]
            [/not]
        [/filter]
        variable=shadow_strikers
    [/store_unit]
[/event]

[event]
name=last breath

    [filter]
        canrecruit=yes
        [filter_side]
            [enemy_of]
                side=1,2
            [/enemy_of]
        [/filter_side]
    [/filter]

    [filter_second]
        find_in=shadow_strikers
    [/filter_second]

    [set_achievement]
        content_for=Liberty_Classic
        id=lc_shadow_strike
    [/set_achievement]
[/event]
#enddef
