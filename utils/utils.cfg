#textdomain wesnoth-lc

#define WEAPON_SPECIAL_ASTRAL_POWER
    [damage_type]
        id=trow_astral_power
        name=_"astral power"
        description=_"This attack deals arcane damage if the target is more vulnerable to arcane"
        alternative_type=arcane
    [/damage_type]
#enddef

#define SET_VILLAGE X Y SIDE
    [capture_village]
        x={X}
        y={Y}
        side={SIDE}
    [/capture_village]
#enddef

#define LIBERTY_DEATHS
    [event]
        name=last breath
        [filter]
            id=Baldras
        [/filter]
        [message]
            speaker=Baldras
            message= _ "Tell my wife... that I loved her!"
        [/message]
        [endlevel]
            result=defeat
            reveal_map=no
        [/endlevel]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Harper
        [/filter]
        [message]
            speaker=Harper
            #wmllint: local spelling Unngh
            message= _ "Unngh... Now our people may never be free..."
        [/message]
        [endlevel]
            result=defeat
            reveal_map=no
        [/endlevel]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Relana
        [/filter]
        [message]
            speaker=Relana
            message= _ "I am finished... will we ever be free?"
        [/message]
        [endlevel]
            result=defeat
            reveal_map=no
        [/endlevel]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Lord Maddock
        [/filter]
        [message]
            speaker=Lord Maddock
            message= _ "How can this be? We have lost."
        [/message]
        [endlevel]
            result=defeat
            reveal_map=no
        [/endlevel]
    [/event]
#enddef

#define VILLAGE_BURNED
    # Generic "you lose" flavor event if there's no better specific one.
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message=_ "They returned to their village to find it destroyed, with those who fought left dead and the few survivors borne away to unknown fates. It was a bitter doom, but as Asheviere’s grip tightened they would live to see worse."
        [/message]
    [/event]
#enddef

#define FROG_SOUND X Y
    [event]
        name=new turn
        first_time_only=no
        [store_time_of_day]
            variable=time_of_day
        [/store_time_of_day]

        [if]
            [not]
                [variable]
                    name=time_of_day.id
                    equals=first_watch
                [/variable]
                [or]
                    [variable]
                        name=time_of_day.id
                        equals=second_watch
                    [/variable]
                [/or]
            [/not]
            [then]
                [sound_source]
                    id=frogs_{X}_{Y}
                    sounds=frogs-1.ogg,frogs-2.ogg,frogs-3.ogg
                    delay=50000
                    chance=10
                    check_fogged=no
                    loop=1
                    x={X}
                    y={Y}
                    full_range=3
                    fade_range=5
                [/sound_source]
            [/then]
            [else]
                [remove_sound_source]
                    id=frogs_{X}_{Y}
                [/remove_sound_source]
            [/else]
        [/if]
        {CLEAR_VARIABLE time_of_day}
    [/event]
#enddef
