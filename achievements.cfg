            id=lc_highwayman
            name= _ "Advance Highwayman"
            description= _ "Advance Highwayman"
            icon="data/core/images/units/human-outlaws/highwayman.png~RC(magenta>red)"
        [/sub_achievement]

        [sub_achievement]
            id=lc_fugitive
            name= _ "Advance Fugitive"
            description= _ "Advance Fugitive"
            icon="data/core/images/units/human-outlaws/fugitive.png~RC(magenta>red)"
        [/sub_achievement]

        [sub_achievement]
            id=lc_huntsman
            name= _ "Advance Huntsman"
            description= _ "Advance Huntsman"
            icon="data/core/images/units/human-outlaws/huntsman.png~RC(magenta>red)"
        [/sub_achievement]

        [sub_achievement]
            id=lc_ranger
            name= _ "Advance Ranger"
            description= _ "Advance Ranger"
            icon="data/core/images/units/human-outlaws/ranger.png~RC(magenta>red)"
        [/sub_achievement]
    [/achievement]
    
    [achievement]
        id=lc_dang
        name= _ "I Command Dangerous Men"
