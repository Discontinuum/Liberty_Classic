#textdomain wesnoth-lc

[achievement_group]
    display_name=_"Liberty (Classic + MP)"
    content_for=Liberty_Classic

    [achievement]
        id=lc_shadows
        name= _ "We Walk in Shadows"
        description= _ "Complete <i>Hide and Seek</i> without being discovered"
        icon="data/core/images/units/human-outlaws/fugitive-melee-2.png~SCALE(72,72)"
        icon_completed="data/core/images/units/human-outlaws/fugitive-melee-2.png~SCALE(72,72)~BLIT("data/core/images/misc/achievement-frames/frame-3-jade.png",0,0)"
    [/achievement]

    [achievement]
        id=lc_goliath
        name= _ "Harper vs. Goliath"
        description= _ "Defeat an Iron Mauler with Harper in any scenario"
        icon="data/core/images/attacks/slingshot.png"
