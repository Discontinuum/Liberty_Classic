        icon="data/add-ons/Liberty_Classic/images/attacks/sword-astral.png~SCALE(72,72)"
        icon_completed="data/add-ons/Liberty_Classic/images/attacks/sword-astral.png~SCALE(72,72)~BLIT("data/core/images/misc/achievement-frames/frame-7-blue.png",0,0)"
