            icon="data/add-ons/Liberty_Classic/images/units/human-outlaws/shadow-lord.png~RC(magenta>red)"
        [/sub_achievement]
    [/achievement]    
    
    [achievement]
        id=trow_we_shadow_strike
        name= _ "A Strike from the Shadow!"
