#textdomain wesnoth-lc
[scenario]
    id=06_The_Grey_Woods
    name= _ "The Grey Woods"
    next_scenario=07_The_Hunters
    victory_when_enemies_defeated=yes
    map_file=~add-ons/Liberty_Classic/maps/06_The_Grey_Woods2.map
    {TURNS 50 44 42}
    {DEFAULT_SCHEDULE_SECOND_WATCH}

    # terrain=* only works inside an event.
    [event]
        name=prestart
        [time_area]
            terrain=U*,U*^*,Ce,Cud,Kud,Ql,Xu
            x,y=27-34,4-9
            {UNDERGROUND}
        [/time_area]
    [/event]

    {INTRO_AND_SCENARIO_MUSIC "underground.ogg" "the_deep_path.ogg"}
    {EXTRA_SCENARIO_MUSIC "hidden_past.ogg"}
    {EXTRA_SCENARIO_MUSIC "elvish-theme.ogg"}
    {EXTRA_SCENARIO_MUSIC "suspense.ogg"}
    {EXTRA_SCENARIO_MUSIC "knalgan_theme.ogg"}

    {LIBERTY_BIGMAP {JOURNEY_06_NEW} }

    [side]
    	side=1
        {SIDE_1_ESSENTIALS}
        {BALDRAS_LATE}
        
        {SIDE_1_GOLD_FIXED 240 150}
        recruit=Thug,Footpad,Poacher
        #ifdef EASY
            shroud=no
            fog=yes
        #else
            shroud=yes
            fog=yes
        #endif
    [/side]
    
    [side]
    	side=2
        {SIDE_2_ESSENTIALS}
        #ifdef MULTIPLAYER       
            {HARPER_LATE}
            gold=150
            recruit=Thug,Footpad,Poacher
            #ifdef EASY
                shroud=no
                fog=yes
            #else
                shroud=yes
                fog=yes
            #endif
        #endif
    [/side]

    [side]
        type=Shadow Lord
        id=Helicrom
        name= _ "Helicrom"
        profile=portraits/helicrom.png
        facing=sw
        side=3
        canrecruit=yes
        recruit=Rogue Mage,Shadow Mage,Thief,Trapper,Huntsman,Outlaw,Fugitive
        gold=250
        {UNPLAYABLE_SIDE}
        [ai]
            recruitment_pattern=mixed fighter,mixed fighter,fighter,mixed fighter,archer
        [/ai]
        shroud=yes
        fog=yes
        #ifdef HARD
            share_vision=shroud
        #else
             share_vision=all  
        #endif
        team_name=good_guys
        user_team_name=_"Rebels"

        [ai]
            village_value=0.5
            leader_value=1
            [goal]
                name=protect_unit
                [criteria]
                    side=1,2
                [/criteria]
                protect_radius=8
                value=2.0
            [/goal]
        [/ai]
    [/side]

    {STARTING_VILLAGES 3 6}

    [side]
        type=Necromancer
        id=Mal-Jarrof
        name= _ "Mal-Jarrof"
        side=4
        canrecruit=yes
        #ifdef EASY 
        recruit=Vampire Bat,Walking Corpse,Ghoul
        #endif
        #ifdef NORMAL 
        recruit=Vampire Bat,Walking Corpse,Ghoul,Soulless,Blood Bat
        #endif
        #ifdef HARD
        recruit=Vampire Bat,Walking Corpse,Ghoul,Ghost,Soulless,Blood Bat,Necrophage
        #endif
        {UNPLAYABLE_SIDE}
        {GOLD 150 190 240}
        shroud=no
        fog=no
        team_name=evil_ones
        user_team_name=_"Evil"
        {FLAG_VARIANT undead}
    [/side]

    {STARTING_VILLAGES 4 9}

    [side]
        type=Necromancer
        id=Mal-Jerod
        name= _ "Mal-Jerod"
        side=5
        canrecruit=yes
        #ifdef EASY 
        recruit=Vampire Bat,Skeleton,Skeleton Archer,Skeleton Rider
        #endif
        #ifdef NORMAL 
        recruit=Vampire Bat,Blood Bat,Skeleton,Skeleton Archer,Skeleton Rider,Revenant,Bone Shooter
        #endif
        #ifdef HARD
        recruit=Vampire Bat,Blood Bat,Skeleton,Skeleton Archer,Skeleton Rider,Revenant,Bone Shooter,Deathblade,Bone Knight
        #endif
        {UNPLAYABLE_SIDE}
        {GOLD 150 190 240}
        shroud=no
        fog=no
        team_name=evil_ones
        user_team_name=_"Evil"
        {FLAG_VARIANT undead}
    [/side]

    {STARTING_VILLAGES 5 9}

    [side]
        type=Lich
        id=Sel-Mana
        name= _ "Sel-Mana"
        facing=sw
        side=6
        canrecruit=yes
        #ifdef EASY 
        recruit=Vampire Bat,Dark Adept,Ghost,Death Squire
        #endif
        #ifdef NORMAL 
        recruit=Vampire Bat,Blood Bat,Dark Adept,Ghost,Death Squire,Wraith
        #endif
        #ifdef HARD
        recruit=Vampire Bat,Blood Bat,Dark Adept,Ghost,Death Squire,Wraith,Shadow,Dark Sorcerer,Draug
        #endif
        {UNPLAYABLE_SIDE}
        {GOLD 240 290 350}
        shroud=no
        fog=no
        team_name=evil_ones
        user_team_name=_"Evil"
        {FLAG_VARIANT undead}
    [/side]

    {STARTING_VILLAGES 6 9}
    
    #define FINISH_WITH_FIVE_HUNDRED_GOLD
    
                [sound]
                    name=gold.ogg
                [/sound]
#ifdef MULTIPLAYER
                [gold]
                    side=1
                    amount=250
                [/gold]
                [gold]
                    side=2
                    amount=250
                [/gold]
                #else
                [gold]
                    side=1
                    amount=500
                [/gold]
                #endif
                [set_variable]
                    name=Helicrom_status
                    value=1
                [/set_variable]    
    #enddef
    
    
    
    #
    # Prestart events
    #
    [event]
        name=prestart

        [objectives]
            side=1,2
            [objective]
                description= _ "Defeat the lich and its minions"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Baldras"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Harper"
                condition=lose
            [/objective]
            
           # [note]
           #     description= _ "Helicrom's veterans may prove useful in a later scenario"
           # [/note]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        [time_area]
            {UNDERGROUND}
			current_time=0
			id="underground"
			x="0,1,2,3,4,5,6,6,7,8,9,10,11,12,13,26,26,27,27,28,28,29,29,30,30,31,31,32,32,33,33,34,34,35,35,36,36,37,37,38,38,39,39,40,40,41,41"
			y="19-27,20-28,20-27,20-28,20-28,21-29,21-23,25-28,21-29,21-28,21-27,21-26,21-26,22-26,24-26,5-6,32-33,4-8,31-34,2-8,29-35,0-9,29-39,0-8,28-40,0-9,28-40,0-10,28-41,0-11,28-41,0-10,28-41,0-10,28-41,0-9,28-41,0-10,28-41,0-9,28-41,0-10,29-41,0-9,30-41,0-9,31-41"
		[/time_area]

        #Initialize switch
        {VARIABLE Helicrom_dead 0}

        #
        # Give Helicrom some free underlings and the villages in his camp
        #
        {GENERIC_UNIT 3 (Rogue Mage) 13 6}
        {GENERIC_UNIT 3 (Shadow Mage) 11 7}

        #
        # Give the SE Lich some baddies to shake things up
        #

        [item]
            x,y=10,20
            image=items/burial.png
        [/item]
        [item]
            x,y=30,9
            image=items/bonestack.png
        [/item]
        [item]
            x,y=33,28
            image=items/burial.png
        [/item]
        [item]
            x,y=29,19
            image=items/bones.png
        [/item]
        
        #ifdef MULTIPLAYER
            [terrain]
                x=5,7
                y=4,3
                terrain=Ce
            [/terrain]
            [terrain]
                x=6
                y=3
                terrain=Ke
            [/terrain]
            [hide_unit]
                id=Harper
            [/hide_unit]
        #endif
    [/event]

    #
    # Starting conversation and actions
    #
    [event]
        name=start
        {MOVE_UNIT id=Baldras 7 4}
        #ifndef MULTIPLAYER
        [recall]
            id=Harper
        [/recall]
        #else
        [unhide_unit]
                id=Harper
        [/unhide_unit]
        #endif
        [redraw]
            side=1
        [/redraw]
        [redraw]
            side=2
        [/redraw]
        [message]
            speaker=Baldras
            message= _ "The leader, I presume."
        [/message]
        [message]
            speaker=Helicrom
            message= _ "I am Helicrom, and you should not be so glib. I control dangerous men. My henchmen can slip unseen through any city, rob a man while he sleeps, or attack a caravan head-on. It’s not noble work, but our pursuits require plenty of gold."
        [/message]
        [message]
            speaker=Baldras
            message= _ "Your pursuits?"
        [/message]
        [message]
            speaker=Helicrom
            message= _ "The former King’s magic ministry kept a tight control on the training and employment of mages in Wesnoth. Those of us who dared to... depart from the curriculum, you might say, were dealt with harshly. We are outcasts because we seek to master shadow magic. Our secrecy and security are not cheap."
        [/message]
        [message]
            speaker=Baldras
            message= _ "I have heard of you. Necromancers. Barely-human scum, I say."
        [/message]
        [message]
            speaker=Helicrom
            message= _ "Wrong. Necromancers become slaves to their lich masters and eventually lose their humanity. We have proven that practicing the dark arts need not lead down that path to damnation. We remain human, and seek the mystical secret of balance between the ways of light and darkness. We dance between both ways, adhering to neither."
        [/message]
        [message]
            speaker=Baldras
            message= _ "I... see, I think. Why do you want to help us?"
        [/message]
        [message]
            speaker=Helicrom
            message= _ "We don’t. You have sought us out. But, I do know of your situation and am willing to help. Any weakening of the Throne of Wesnoth, whether it be occupied by King or Queen, aids us."
        [/message]
        [message]
            speaker=Helicrom
            message= _ "Carcyn is always foggy as of late because these woods have recently become home to a lich and two of its underling necromancers. Our experiments may have actually aroused it from sleep... We’re not sure."
        [/message]
        [message]
            speaker=Baldras
            message= _ "So now you need to defend your rear as well as your front... I see your predicament. My men will wipe this land clean if you can help us defend our homeland."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Sel-Mana
        [/filter]
        [if]
            [have_unit]
                side=4
                canrecruit=yes
            [/have_unit]

            [or]
                [have_unit]
                    side=5
                    canrecruit=yes
                [/have_unit]
            [/or]

            [then]
                [message]
                    speaker=Helicrom
                    message= _ "Finally, that creature is dead, yet its foolish minions resist."
                [/message]
            [/then]

            [else]
                [message]
                    speaker=Baldras
                    message= _ "The lich is destroyed and its minions dead."
                [/message]
            [/else]
        [/if]
    [/event]

    [event]
        name=enemies defeated

        [if]
            [variable]
                name=Helicrom_dead
                numerical_equals=1
            [/variable]
            [then]
                [message]
                    speaker=narrator
                    message= _ "The defeat of the evil lich infesting the Grey Woods was a bittersweet victory. With Helicrom dead, the guild of shadow magic was thrown into disarray."
                    image="wesnoth-icon.png"
                [/message]
                [message]
                    speaker=narrator
                    message= _ "The remaining members were very grateful and offered Baldras a sizable sum of gold for his help. It was not the help he was hoping for, but he knew it would have to be enough for the coming conflict."
                    image="wesnoth-icon.png"
                [/message]
                {FINISH_WITH_FIVE_HUNDRED_GOLD}
            [/then]

            [else]
                [message]
                    speaker=Helicrom
                    message= _ "With the undead driven out, we may live here in relative peace and pursue our studies. For this, Baldras, I am grateful."
                [/message]
                [message]
                    speaker=Baldras
                    message= _ "Studies? Peace? You mean to continue feeding on the lawful citizens of Wesnoth. There will be no peace for them."
                [/message]
                [message]
                    speaker=Helicrom
                    message= _ "No one here is in a position to be dispensing moral judgments. Regardless, you have done great service to us today, and we owe you a debt. I will help you to the utmost of my ability."
                [/message]
                [message]
                    speaker=Helicrom
                    message= _ "I was planning on giving you gold. Any good army is well financed, and with the lich gone we can now spare it."
                [/message]
                [message]
                    speaker=Helicrom
                    message= _ "But, I think it would help you more if I lent you some of my men to join you on your adventures. The Queen has been sending mages out here, and my men are itching for some payback."
                [/message]
                [message]
                    speaker=Helicrom
                    message= _ "On the other hand, if I keep the full force of my organization here, we might be able to regroup and join you on the battlefield when the time comes."
                [/message]
                [message] #TODO: what if in MP we win on an AI turn?
                    speaker=Helicrom
                    message= _ "I leave it to you to decide."
                    [option]
                        label= _ "I will take the gold. How does 500 sound?"
                        [command]
                            [message]
                                speaker=Helicrom
                                message= _ "Agreed. Good luck and farewell to you, Master Baldras."
                            [/message]

                            {FINISH_WITH_FIVE_HUNDRED_GOLD}
                        [/command]
                    [/option]

                    # Note: don't mess with the alignment in the next message key.
                    [option]
                        label= _ "Send your men with us. They will be valuable help as we prepare for the assault from the Wesnoth army garrison."
                        [command]
                            [message]
                                speaker=Helicrom
                                message= _ "Done. My finest mages and thieves are at your disposal. Use them well."
                            [/message]

                            [allow_recruit]
                                side=1,2
                                type=Thief,Rogue Mage,Shadow Mage
                            [/allow_recruit]

                            [set_variable]
                                name=Helicrom_status
                                value=2
                            [/set_variable]
                        [/command]
                    [/option]
                    [option]
                        label= _ "I wish you to join us in battle against the Queen’s forces."
                        [command]
                            [message]
                                speaker=Helicrom
                                message= _ "All right. I need time to clean up this forest and recall my men from the countryside. We will be ready to march in seven days. All now hinges on you! Until then..."
                            [/message]

                            [set_variable]
                                name=Helicrom_status
                                value=3
                            [/set_variable]
                            
                            [store_unit]
                                [filter]
                                        id=Helicrom
                                [/filter]
                                variable=stored_Helicrom
                            [/store_unit]
                            # let us save his units to recall later
                            [store_unit]
                                [filter]
                                    side=3
                                    [not]
                                        id=Helicrom
                                    [/not]
                                [/filter]
                                variable=stored_Helicrom_veterans
                            [/store_unit]
                        [/command]
                    [/option]
                [/message]
            [/else]
        [/if]

        {CLEAR_VARIABLE Helicrom_dead}

        [endlevel]
            result=victory
#ifdef MULTIPLAYER
                    bonus=0.5
#else
                    bonus=yes
#endif
            {NEW_GOLD_CARRYOVER 40}
        [/endlevel]
    [/event]

    #
    # Loss conditions - turns run out
    #
    [event]
        name=time over
        [message]
            speaker=Baldras
            message= _ "We have spent too much time here. Surely the Queen’s forces have returned to Dallben. Our mission is unfinished, but we must return to fight a suicide battle."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

    {LIBERTY_DEATHS}
    {LIBERTY_ACHIEVEMENTS}

    {VILLAGE_BURNED}

    #
    # Helicrom dies - you don't lose but your benefits are not so good.
    #
    [event]
        name=last breath
        [filter]
            id=Helicrom
        [/filter]
        [message]
            speaker=Helicrom
            message= _ "My men... have failed to protect me! I perish..."
        [/message]
        {VARIABLE Helicrom_dead 1}
    [/event]
[/scenario]

#undef FINISH_WITH_FIVE_HUNDRED_GOLD
