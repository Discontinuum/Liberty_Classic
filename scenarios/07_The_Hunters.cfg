#textdomain wesnoth-lc
[scenario]
    id=07_The_Hunters
    name= _ "The Hunters"
    next_scenario=08_Glory
    map_file=~add-ons/Liberty_Classic/maps/07_The_Hunters.map
    {TURNS 38 34 30}
    {DEFAULT_SCHEDULE_DUSK}

    {INTRO_AND_SCENARIO_MUSIC breaking_the_chains.ogg vengeful.ogg}
    {EXTRA_SCENARIO_MUSIC battle.ogg}
    {EXTRA_SCENARIO_MUSIC siege_of_laurelmor.ogg}
    {EXTRA_SCENARIO_MUSIC wanderer.ogg}
    {EXTRA_SCENARIO_MUSIC knalgan_theme.ogg}

    [story]
        [part]
            story= _ "Baldras and his men quickly left the Grey Woods, not entirely convinced of their safety even after eradicating the lich."
        [/part]
        [part]
            story= _ "As they marched, many men and women from the small hamlets peppering the area around Carcyn and the Grey Woods approached the group, asking to join them. The ascent of the Queen had cast an uneasy pall over the citizens of Wesnoth, and some of them were willing to resist it."
        [/part]
        [part]
            story= _ "Knowing they too would be labeled criminals, he reluctantly accepted their help.
<b>Note:</b> Baldras is now able to recruit Outlaws."
        [/part]
        [part]
            story= _ "Camped at the edge of the forest, they quietly observed substantial troop movements coming from the direction of Aldril, a nearby city, and marching to the northwest. Unsure what to make of it, they debated their next course of action..."
        [/part]
    [/story]

    {LIBERTY_BIGMAP {JOURNEY_07_NEW} }

    [side]
    	side=1
        {SIDE_1_ESSENTIALS}
        {BALDRAS_LATE}
        fog=yes
        {SIDE_1_GOLD 200 150 100 100 75 50}
        recruit=Thug,Footpad,Poacher,Outlaw
    [/side]
    
    [side]
    	side=2
        {SIDE_2_ESSENTIALS}
        fog=yes
        #ifdef MULTIPLAYER       
            {HARPER_LATE}
            {GOLD 100 75 50}
            recruit=Thug,Footpad,Poacher,Outlaw
        #endif
    [/side]

    [side]
        side=3
        type=Lieutenant
        id=Archarel
        name= _ "Archarel"
        canrecruit=yes
        controller=null
        fog=yes
        recruit=Spearman, Bowman, Mage
        {GOLD 75 100 125}
        {UNPLAYABLE_SIDE}
        [ai]
            recruitment_pattern=fighter,fighter,archer
            village_value=0
        [/ai]
        team_name=bad_guys
        user_team_name=_"Asheviere"
        {FLAG_VARIANT loyalist}
        defeat_condition=no_units_left
    [/side]

    [side]
        side=4
        type=Iron Mauler
        id=Linneus
        name= _ "Linneus"
        facing=sw
        canrecruit=yes
        fog=yes
        recruit=Heavy Infantryman,Mage,Spearman
        gold=100
        {UNPLAYABLE_SIDE}
        team_name=bad_guys
        user_team_name=_"Asheviere"
        {FLAG_VARIANT loyalist}
        defeat_condition=no_units_left
    [/side]

    [event]
        name=prestart
        [micro_ai]
            side=4
            ai_type=goto
            action=add
            [filter_location]
                x,y=3,7
                radius=1
            [/filter_location]
            ignore_enemy_at_goal=yes
            ingore_units=no
        [/micro_ai]
        [label]
        x,y=3,7
        text=Outpost
        [/label]
        {PLACE_IMAGE scenery/rock1.png 12 22}

        [objectives]
            side=1,2
            [objective]
                description= _ "Kill all enemy patrols before they reach the outpost"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Baldras"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Harper"
                condition=lose
            [/objective]
            [objective]
                description= _ "Any patrol units survive when turns run out"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        #Hide both leaders initially
        [store_unit]
            variable=stored_Archarel
            [filter]
                id=Archarel
            [/filter]
        [/store_unit]
        [store_unit]
            variable=stored_Linneus
            kill=yes
            [filter]
                id=Linneus
            [/filter]
        [/store_unit]
        #set up units
        #ifndef MULTIPLAYER
        [recall]
            id=Harper
        [/recall]
        #else
        [terrain]
        	x=15,14,16,16,15
        	y=19,19,19,20,21
        	terrain=Ce
        [/terrain]
        [terrain]
        	x=15
        	y=20
        	terrain=Ke
        [/terrain]
        #endif
        {NAMED_LOYAL_UNIT {MP_SIDE_UNIT} Outlaw 14 20 Jingo ( _ "Jingo")}
        {NAMED_LOYAL_UNIT 1 Outlaw 31 11 Majel ( _ "Majel")}
    [/event]

    #
    # Starting conversation and actions
    #
    [event]
        name=start

        [allow_recruit]
            side=1
            type=Outlaw
        [/allow_recruit]
        
        #ifdef MULTIPLAYER
        	[allow_recruit]
		    side=2
		    type=Outlaw
		[/allow_recruit]
        #endif
        
        [message]
            speaker=Baldras
            message= _ "The words of Lord Maddock have weighed heavy on me these past few days. It has dawned on me that we can never win. We will never defeat the entire army of Wesnoth. Idiocy! If the noble lord of Elensefar is unwilling to resist the Queen, how should I ever expect to?"
        [/message]
        [message]
            speaker=Harper
            message= _ "What’s worse is that she appears to have taken notice. We have counted five platoons of heavy infantry marching towards the garrison in just the last two hours."
        [/message]
        [message]
            speaker=Baldras
            message= _ "The garrison. The towers of Halstead are more than a garrison, nephew, they are a fortress. They used to protect this area from the enemies of Wesnoth; I never imagined they would house its enemies."
        [/message]

        {NAMED_LOYAL_UNIT 1 Dragoon 1 4 (Pitcher) ( _ "Pitcher")}

        {MOVE_UNIT id=Pitcher 20 16}

        [message]
            speaker=Pitcher
            message={WHISPER _"whisper^<i>Baldras!</i>"}
        [/message]
        [message]
            speaker=Harper
            message= _ "Uncle, he wears the crest of the Elense. We should answer."
        [/message]
        [message]
            speaker=Baldras
            message= _ "Rider, hush before we are discovered! Come to us, but quietly!"
        [/message]

        {MOVE_UNIT id=Pitcher 29 13}

        [message]
            speaker=Pitcher
            message= _ "Master Baldras, I bring news from the north. During the past week, several patrols have again ventured across the Great River into Annuvin. A woman named Relana opposed them with a small militia. She was victorious."
        [/message]
        [message]
            speaker=Majel
            message= _ "This is surely good news!"
        [/message]
        [message]
            speaker=Pitcher
            message= _ "I am afraid it is not. The Queen is sending a branch of her main field army directly from Weldyn. As soon as they arrive, they will burn every village to the ground. No one will live."
        [/message]
        [message]
            speaker=Baldras
            message= _ "The troop movements all make sense now. We must stop this army from reaching the garrison. We cannot swallow them whole, but we can gnaw away at them. They mustn’t take one step without us being there to harass and delay them. When they reach Halstead they must be exhausted or dying."
        [/message]
        [message]
            speaker=Harper
            message= _ "You just said we can’t beat their entire army!"
        [/message]
        [message]
            speaker=Baldras
            message= _ "Do you propose surrender? It’s this or nothing. All we can do is see it through to the end."
        [/message]
        [message]
            speaker=Pitcher
            message= _ "May you prevail in peace and war. I must depart before I am seen so far from my Lord’s borders."
        [/message]

        {MOVE_UNIT id=Pitcher 1 5}

        [kill]
            id=Pitcher
        [/kill]

        [message]
            speaker=Jingo
            message= _ "Another platoon approaches..."
        [/message]

#define TROOPER TYPE TO_X TO_Y
    [move_unit_fake]
        type={TYPE}
        side=4
        x=36,{TO_X}
        y=23,{TO_Y}
    [/move_unit_fake]
    {GENERIC_UNIT 4 {TYPE} {TO_X} {TO_Y}}
    [+unit]
        facing=sw
    [/unit]
            {SCROLL_TO 34 22}
        [lift_fog]
            [filter_side]
                side=1
                side=2
            [/filter_side]
            x,y=34,22
            radius=3
        [/lift_fog]
#enddef

#ifdef EASY
        {TROOPER "Heavy Infantryman" 33 22}
#else
        {TROOPER "Shock Trooper"     33 22}
#endif

        {TROOPER "Heavy Infantryman" 33 23}
        {TROOPER "Heavy Infantryman" 34 21}

#ifdef EASY
        {TROOPER "Heavy Infantryman" 35 22}
#else
        {TROOPER "Shock Trooper"     35 22}
#endif

        {TROOPER "Heavy Infantryman" 35 23}

#ifdef HARD
        {TROOPER "Shock Trooper"     36 22}
#else
        {TROOPER "Heavy Infantryman" 36 22}
#endif
        [unstore_unit]
            variable=stored_Linneus
        [/unstore_unit]
        {CLEAR_VARIABLE stored_Linneus}

        [message]
            speaker=Baldras
            message= _ "When we are done, no one will fear the open roads and night sky more than the army of the usurper. Strike fast, strike silently... and leave no one alive."
        [/message]
    [/event]
        [event]
        name=turn 6

        {SCROLL_TO 34 22}
        [lift_fog]
            [filter_side]
                side=1
                side=2
            [/filter_side]
            x,y=34,22
            radius=3
        [/lift_fog]

        {TROOPER "Spearman" 33 22}
        {TROOPER "Heavy Infantryman" 33 23}

#ifdef EASY
        {TROOPER "Spearman" 34 21}
#else
        {TROOPER "Javelineer"     34 21}
#endif

#ifdef EASY
        {TROOPER "Bowman" 35 22}
#else
        {TROOPER "Longbowman"     35 22}
#endif

#ifdef HARD
        {TROOPER "Shock Trooper"     35 23}
#else
        {TROOPER "Heavy Infantryman" 35 23}
#endif
            [unit]
            side=4
            type=Cavalier
            facing=sw
            canrecruit=yes
            x,y=34,22
        [/unit]
    [/event]
        [event]
        name=turn 12

        {SCROLL_TO 34 22}
        [lift_fog]
            [filter_side]
                side=1
                side=2
            [/filter_side]
            x,y=34,22
            radius=3
        [/lift_fog]

        {TROOPER "Spearman" 33 23}
        {TROOPER "Heavy Infantryman" 33 22}

#ifdef EASY
        {TROOPER "Spearman" 34 21}
#else
        {TROOPER "Javelineer"     34 21}
#endif

#ifdef EASY
        {TROOPER "Heavy Infantryman" 35 22}
#else
        {TROOPER "Shock Trooper"     35 22}
#endif

#ifdef HARD
        {TROOPER "Longbowman"     35 23}
#else
        {TROOPER "Bowman" 35 23}
#endif

        [unit]
            side=4
            type=Halberdier
            facing=sw
            canrecruit=yes
            x,y=34,22
        [/unit]
    [/event]
    
    [event]
        name=turn 18

        {SCROLL_TO 34 22}
        [lift_fog]
            [filter_side]
                side=1
                side=2
            [/filter_side]
            x,y=34,22
            radius=3
        [/lift_fog]

        {TROOPER "Shock Trooper" 33 23}
        {TROOPER "Heavy Infantryman" 33 22}
        {TROOPER "Swordsman" 35 22}

#ifdef EASY
        {TROOPER "Bowman" 35 23}
#else
        {TROOPER "Longbowman"     35 23}
#endif

#ifdef HARD
        {TROOPER "Shock Trooper"     36 22}
#else
        {TROOPER "Heavy Infantryman" 36 22}
#endif
        {TROOPER "Spearman" 32 22}
        [unit]
            side=4
            type=General
            facing=sw
            canrecruit=yes
            x,y=34,22
        [/unit]
    [/event]
    [event]
        name=turn 24

        {SCROLL_TO 34 22}
        [lift_fog]
            [filter_side]
                side=1
                side=2
            [/filter_side]
            x,y=34,22
            radius=3
        [/lift_fog]

        {TROOPER "Swordsman" 33 23}
        {TROOPER "Duelist" 33 22}

#ifdef EASY
        {TROOPER "Fencer" 34 21}
#else
        {TROOPER "Duelist"     34 21}
#endif

#ifdef EASY
        {TROOPER "Heavy Infantryman" 35 22}
#else
        {TROOPER "Shock Trooper"     35 22}
#endif

#ifdef HARD
        {TROOPER "Longbowman"     35 23}
#else
        {TROOPER "Bowman" 35 23}
#endif

        [unit]
            side=4
            type=Master at Arms
            facing=sw
            canrecruit=yes
            x,y=34,22
        [/unit]
    [/event]
        #
    # Special Event - when you attack the bad guys for the first time they react
    #
    [event]
        name=attack
        [filter_second]
            side=4
        [/filter_second]
        [message]
            speaker=Linneus
            message= _ "It’s an ambush! Hold your ground!"
        [/message]
    [/event]
    #
    # Special Event - after 1 turns, the outpost detachment returns to fight you
    #
    [event]
        name=turn 1
        [unstore_unit]
            variable=stored_Archarel
        [/unstore_unit]
        {CLEAR_VARIABLE stored_Archarel}
    [/event]
    
    [event]
    name=turn 5
    id=Archarel_wakes_up
    [filter_side]
        side=3
    [/filter_side]
    [message]
        speaker=Archarel
        message= _ "Patrol must be returning right now, however i don't see them on the road. I have to start searching the forest to find them, perhaps they found some brigands and need some help."
    [/message]
    controller=ai
    [/event]
    [event]
    name=sighted
    id=sighted
    [filter_side]
        side=3
    [/filter_side]
    [message]
        speaker=Archarel
        message= _ "Filthy brigands are dare to oppose Wesnoth army! Our patrols will teach them a lesson!"
    [/message]
    [/event]
    [event]
    name=moveto
    [filter]
        side=1,2
        [filter_location]
        x,y=3,5
        radius=6
        [/filter_location]
    [/filter]
    [gold]
        amount=200
        side=3
    [/gold]
    [message]
        speaker=Archarel
        message= _ "These bandits are storming the outpost! Brothers, to arms!"
    [/message]
    [/event]
    # Victory
    #
    [event]
        name=enemies defeated

        [message]
            speaker=Baldras
            message= _ "What a bloody mess. We must attack Halstead next. If we wait, they will become invincible. If we can burn it to the ground before that happens, our people may have a chance. Rest well tonight, because tomorrow’s battle will decide the fate of our homes, our families, and our freedom."
        [/message]

        [if]
            [variable]
                name=Helicrom_status
                numerical_equals=3
            [/variable]
            [then]
                [message]
                    speaker=Baldras
                    message= _ "Send word to Helicrom that we are ready. It is time for him to repay his debt."
                [/message]
            [/then]
        [/if]

        {CLEAR_VARIABLE stored_Archarel}

        [endlevel]
            result=victory
#ifdef MULTIPLAYER
                    bonus=0.5
#else
                    bonus=yes
#endif
            {NEW_GOLD_CARRYOVER 40}
        [/endlevel]
    [/event]
    [event]
        name=die
        id=no_enemies_left
        [if]
            [not]
                [have_unit]
                side=4
                [/have_unit]
            [/not]
            [and]
                [variable]
                name=turn_number
                greater_than=23
                [/variable]
            [/and]
            [then]
                [message]
                speaker=Archarel
                message= _ "This forest is haunted with ghosts and brigands! We must stop sending patrols here. My men, return to outpost and regroup."
                [/message]
                [message]
                speaker=Baldras
                message= _ "What a bloody mess. We must attack Halstead next. If we wait, they will become invincible. If we can burn it to the ground before that happens, our people may have a chance. Rest well tonight, because tomorrow’s battle will decide the fate of our homes, our families, and our freedom."
                [/message]

                [if]
                [variable]
                name=Helicrom_status
                numerical_equals=3
                [/variable]
                [then]
                [message]
                    speaker=Baldras
                    message= _ "Send word to Helicrom that we are ready. It is time for him to repay his debt."
                [/message]
                [/then]
                [/if]

                {CLEAR_VARIABLE stored_Archarel}

                [endlevel]
                result=victory
#ifdef MULTIPLAYER
                    bonus=0.5
#else
                    bonus=yes
#endif
                {NEW_GOLD_CARRYOVER 40}
                [/endlevel]
            [/then]
            [/if]
    [/event]
    #
    # Loss conditions - turns run out
    #
    [event]
        name=time over
        [message]
            speaker=Baldras
            message= _ "We have spent too much time here. Surely the entire Wesnoth army marches on our position. We are done for!"
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    [event]
        name=moveto
        id=Patrols_rest
        [filter]
            side=4
            x=3
            y=7
            radius=1
        [/filter]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
    
    {LIBERTY_DEATHS}
    {LIBERTY_ACHIEVEMENTS}

    {VILLAGE_BURNED}
[/scenario]

#undef TROOPER
