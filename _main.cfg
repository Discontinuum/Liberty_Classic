#textdomain wesnoth-l
# This version forked from 1.2, 2/10/2007, and prepared for mainline by ESR
[textdomain]
    name="wesnoth-l"
[/textdomain]

# wmlscope: set export=no
[campaign]
    id=Liberty_Classic
    name= _ "Liberty" + _ " (Classic + MP mode)"
    abbrev= _ "Liberty" + " Classic"
    rank=55
    type=hybrid
    allow_era_choice=no
    min_players=1
    max_players=2
    year="501 YW"
    first_scenario=01_The_Raid
    define=CAMPAIGN_LIBERTY_CLASSIC
    icon="units/human-outlaws/fugitive.png~RC(magenta>red)"
    image="data/campaigns/Liberty_Classic/images/campaign_image.png"

    {CAMPAIGN_DIFFICULTY EASY   "units/human-peasants/peasant.png~RC(magenta>red)" ( _ "Peasant") ( _ "Easy")}
    {CAMPAIGN_DIFFICULTY NORMAL "units/human-outlaws/outlaw.png~RC(magenta>red)" ( _ "Outlaw") ( _ "Normal")}
    {CAMPAIGN_DIFFICULTY HARD   "units/human-outlaws/fugitive.png~RC(magenta>red)" ( _ "Fugitive") ( _ "Difficult")} {DEFAULT_DIFFICULTY}

    #po: Yes, that is "marchlanders", not "marshlanders".
    #po: "marchlander" is archaic English for an inhabitant of a border region.
    # wmllint: local spelling marchlanders
    description= _ "As the shadow of civil war lengthens across Wesnoth, a band of hardy marchlanders revolts against the tyranny of Queen Asheviere. To win their way to freedom, they must defeat not just the trained blades of Wesnothian troops but darker foes including orcs and undead.

" + _"(Novice level, 8 scenarios.)"

    [about]
        title = _ "Campaign Design"
        [entry]
            name = "Scott Klempner"
        [/entry]
    [/about]
    [about]
        title = _ "Prose-doctoring and preparation for mainline"
        [entry]
            name = "Eric S. Raymond (ESR)"
        [/entry]
    [/about]
    [about]
        title = _ "Former Campaign Maintenance"
        [entry]
            name = "Eric S. Raymond (ESR)"
        [/entry]
        [entry]
            name = "Lari Nieminen (zookeeper)"
        [/entry]
    [/about]
    [about]
        title = _ "Artwork and Graphics Design"
        [entry]
            name = "Brendan Sellner"
        [/entry]
        [entry]
            name = "Kathrin Polikeit (Kitty)"
            comment = "portraits"
        [/entry]
        [entry]
            name = "Shadow"
        [/entry]
        [entry]
            name = "Blarumyrran"
            comment = "story images, Rogue Mage line sprites"
        [/entry]
        [entry]
            name = "Sonny T Yamada (SkyOne)"
            comment = "Sprite animations (defense and attack) of Rogue Mage line"
        [/entry]
    [/about]
[/campaign]

#ifdef CAMPAIGN_LIBERTY_CLASSIC

[binary_path]
    path=data/add-ons/Liberty_Classic
[/binary_path]

# Define macro that expands into include paths for this campaign
#define L_INCLUDE TARGET_VALUE
    {~add-ons/Liberty_Classic/{TARGET_VALUE}}
#enddef

{L_INCLUDE utils}
{L_INCLUDE scenarios}

[units]
    {L_INCLUDE units}
[/units]

#endif

# wmllint: directory spelling Grey Relana Helicrom Fal Khag
